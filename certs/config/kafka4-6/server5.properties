ssl.keystore.location=/etc/kafka/secrets/kafka5.keystore.jks
ssl.keystore.password=password-kafka5
ssl.key.password=password-kafka5
ssl.truststore.location=/etc/kafka/secrets/kafka5.truststore.jks
ssl.truststore.password=password-kafka5
ssl.client.auth=required
ssl.endpoint.identification.algorithm=
authorizer.class.name=kafka.security.auth.SimpleAclAuthorizer
allow.everyone.if.no.acl.found=false
auto.create.topics.enable=true
delete.topic.enable=true
offsets.topic.replication.factor=1