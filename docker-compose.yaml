  # =======================================================
  # ===================== Spark ===========================
  # =======================================================

  # Apache Spark master node
  spark-master:
    image: bitnamilegacy/spark:3.5.4
    container_name: spark-master
    depends_on:
      - hadoop-datanode-1
    ports:
      - "8888:8080"  # HTTP-порт для Web UI Spark
      - "7077:7077"  # Порт для Spark master-сервис
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master

  # Apache Spark worker node
  spark-worker:
    image: bitnamilegacy/spark:3.5.4
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077


  # Контейнер для модуля 'analytics-service' (по другому не очень хорошо получалось)
  # Раскомментить при необходимости запуска!
  analytics-service:
    build: .


volumes:
  kafka1-data:
  kafka2-data:
  kafka3-data:
  kafka4-data:
  kafka5-data:
  kafka6-data:
  zk1-data:
  zk2-data: