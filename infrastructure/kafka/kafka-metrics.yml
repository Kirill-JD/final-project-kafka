lowercaseOutputName: true
lowercaseOutputLabelNames: true

rules:
  # === BROKER HEALTH ===
  - pattern: "kafka.server<type=ReplicaManager, name=UnderReplicatedPartitions><>Value"
    name: kafka_server_under_replicated_partitions
    type: GAUGE

  - pattern: "kafka.controller<type=KafkaController, name=ActiveControllerCount><>Value"
    name: kafka_controller_active
    type: GAUGE

  - pattern: "kafka.controller<type=KafkaController, name=OfflinePartitionsCount><>Value"
    name: kafka_controller_offline_partitions
    type: GAUGE

  # === REQUESTS ===
  - pattern: "kafka.network<type=RequestMetrics, name=RequestsPerSec, request=(.+)><>Count"
    name: kafka_network_requests_total
    labels:
      request: "$1"
    type: COUNTER

  # === TRAFFIC ===
  - pattern: "kafka.server<type=BrokerTopicMetrics, name=BytesInPerSec><>Count"
    name: kafka_server_bytes_in_total
    type: COUNTER

  - pattern: "kafka.server<type=BrokerTopicMetrics, name=BytesOutPerSec><>Count"
    name: kafka_server_bytes_out_total
    type: COUNTER

  # === LOG ===
  - pattern: "kafka.log<type=Log, name=LogEndOffset, topic=(.+), partition=(.+)><>Value"
    name: kafka_log_end_offset
    labels:
      topic: "$1"
      partition: "$2"
    type: GAUGE

  # === JVM (очень полезно) ===
  - pattern: "java.lang<type=Memory><HeapMemoryUsage>(used|committed)"
    name: jvm_memory_$1_bytes
    type: GAUGE